<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Message</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        @media print { html, body { display: none !important; } }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            touch-action: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 5vh 6vw; /* Relative to viewport */
        }

        /* Top Header */
        .header {
            width: 100%;
            text-align: center;
            margin-bottom: 3vh;
            opacity: 0.4;
        }
        .header-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Message Display Area (Flexible) */
        .main-display {
            flex-grow: 1; /* Occupies available space */
            width: 100%;
            max-width: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 20vh; /* Space from sensors */
        }

        .msg-card {
            width: 100%;
            background: linear-gradient(165deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 30px;
            opacity: 0;
            transform: scale(0.97) translateY(10px);
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .msg-card.visible { opacity: 1; transform: scale(1) translateY(0); }

        .msg-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #eee;
            width: 100%;
            font-weight: 300;
            word-wrap: break-word;
        }

        /* Hold-to-view sensors (Pinned to Bottom) */
        .sensor-system {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 180px;
            padding: 0 10vw 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            z-index: 1000;
        }

        .sensor-row {
            width: 100%;
            max-width: 450px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .hold-hint {
            margin-bottom: 30px;
            font-size: 0.75rem;
            color: #444;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .sensor {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.2s;
        }

        .sensor-dot { width: 10px; height: 10px; background: #222; border-radius: 50%; transition: all 0.3s; }

        .sensor.active { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); transform: scale(0.95); }
        .sensor.active .sensor-dot { background: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5); }

        /* System States */
        #shield { position: fixed; inset: 0; background: #000; z-index: 99999; display: none; }
        #shield.on { display: block; }

        .state { display: none; text-align: center; width: 100%; padding-top: 15vh; }
        .state.active { display: block; }
        .status-msg { font-size: 0.85rem; color: #444; }

        /* Desktop Mode */
        @media (hover: hover) and (pointer: fine) {
            .sensor-system { display: none !important; }
            .msg-card { opacity: 1; transform: none; }
            .main-display { padding-bottom: 0; }
        }

        /* Password Unlock Area */
        #pwArea input {
            background: #111; border: 1px solid #333; color: #fff; padding: 16px; 
            border-radius: 12px; width: 220px; text-align: center; outline: none;
            margin-bottom: 20px; font-family: inherit; font-size: 0.9rem;
        }
        #pwArea button { background: #fff; color: #000; border: none; padding: 12px 30px; border-radius: 10px; font-weight: 600; cursor: pointer; }

    </style>
</head>
<body>
    <div id="shield"></div>

    <div class="header"><div class="header-title">Secure Encrypted Bridge</div></div>

    <!-- MAIN VIEW STATE -->
    <div class="state active" id="stateMessage">
        <div class="main-display">
            <div class="msg-card" id="msgCard">
                <div class="msg-text" id="msgText"></div>
            </div>
        </div>

        <div class="sensor-system" id="sensorSystem" style="display:none;">
            <div class="hold-hint" id="holdHint">Secure Two-Thumb Access Only</div>
            <div class="sensor-row">
                <div class="sensor" id="sensorLeft"><div class="sensor-dot"></div></div>
                <div class="sensor" id="sensorRight"><div class="sensor-dot"></div></div>
            </div>
        </div>
    </div>

    <!-- LOADING / ERROR STATES -->
    <div class="state" id="stateLoading"><div class="status-msg">Reading secure bytes...</div></div>
    <div class="state" id="stateGone"><div class="status-msg">Note has been purged or link expired.</div></div>
    <div class="state" id="statePw">
        <div id="pwArea">
            <input type="password" id="pw" placeholder="Security Key">
            <button onclick="submitPw()">Unlock</button>
        </div>
    </div>

    <script>
        const msgId = window.location.pathname.split('/view/')[1];
        const shield = document.getElementById('shield');
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        let destroyed = false;
        let messageLoaded = false;

        document.addEventListener('visibilitychange', () => { if (document.hidden && messageLoaded) killMessage(); });
        window.addEventListener('blur', () => { if (messageLoaded) killMessage(); });
        window.addEventListener('pagehide', () => killMessage());
        window.addEventListener('beforeunload', () => killMessage());

        const sensorLeft = document.getElementById('sensorLeft');
        const sensorRight = document.getElementById('sensorRight');
        const msgCard = document.getElementById('msgCard');
        const holdHint = document.getElementById('holdHint');
        const msgText = document.getElementById('msgText');

        let leftHeld = false;
        let rightHeld = false;
        let activeTouches = {};

        function isInsideZone(touch, sensor) {
            const rect = sensor.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const radius = rect.width / 2;
            const dx = touch.clientX - centerX;
            const dy = touch.clientY - centerY;
            const buffer = 25; 
            return (dx * dx + dy * dy) <= ((radius + buffer) * (radius + buffer));
        }

        function updateHoldState() {
            if (destroyed || !messageLoaded) return;
            if (leftHeld && rightHeld) {
                msgCard.classList.add('visible');
                holdHint.style.opacity = '0';
            } else {
                msgCard.classList.remove('visible');
                holdHint.style.opacity = '1';
            }
        }

        if (isTouchDevice) {
            document.addEventListener('touchstart', (e) => {
                if (!messageLoaded || destroyed) return;
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (isInsideZone(t, sensorLeft)) {
                        leftHeld = true; sensorLeft.classList.add('active'); activeTouches[t.identifier] = 'left';
                    }
                    if (isInsideZone(t, sensorRight)) {
                        rightHeld = true; sensorRight.classList.add('active'); activeTouches[t.identifier] = 'right';
                    }
                }
                updateHoldState();
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                if (!messageLoaded || destroyed) return;
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (activeTouches[t.identifier] === 'left' && !isInsideZone(t, sensorLeft)) {
                        leftHeld = false; sensorLeft.classList.remove('active'); delete activeTouches[t.identifier];
                    }
                    if (activeTouches[t.identifier] === 'right' && !isInsideZone(t, sensorRight)) {
                        rightHeld = false; sensorRight.classList.remove('active'); delete activeTouches[t.identifier];
                    }
                }
                updateHoldState();
            });

            document.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (activeTouches[t.identifier] === 'left') { leftHeld = false; sensorLeft.classList.remove('active'); }
                    if (activeTouches[t.identifier] === 'right') { rightHeld = false; sensorRight.classList.remove('active'); }
                    delete activeTouches[t.identifier];
                }
                updateHoldState();
            });
        }

        async function loadMessage(password) {
            try {
                const res = await fetch(`/api/messages/${msgId}/reveal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password || '' })
                });
                const data = await res.json();
                if (!res.ok) {
                    if (data.error && data.error.includes('password')) { showState('statePw'); return; }
                    showState('stateGone'); return;
                }
                msgText.textContent = data.content;
                messageLoaded = true;
                showState('stateMessage');
                if (isTouchDevice) document.getElementById('sensorSystem').style.display = 'flex';
            } catch { showState('stateGone'); }
        }

        function showState(id) {
            document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function submitPw() {
            const pw = document.getElementById('pw').value;
            if (pw) { showState('stateLoading'); loadMessage(pw); }
        }

        function killMessage() {
            if (destroyed) return;
            destroyed = true;
            document.body.innerHTML = '<div style="color:#222; font-size: 0.75rem; margin-top:20vh; text-align:center;">Purged.</div>';
        }

        if (msgId) loadMessage();
    </script>
</body>
</html>
