<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Message</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * {
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        @media print { html, body { display: none !important; } }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #ccc;
            font-family: 'Inter', -apple-system, sans-serif;
            touch-action: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Start message from top area */
            padding: 60px 24px 0;
        }

        /* Black shield */
        #shield {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 99999;
            display: none;
        }
        #shield.on { display: block; }

        /* Message Card - Glassy look */
        .msg-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.2s ease;
        }

        .msg-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .msg-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #d0d0d0;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-align: left;
            width: 100%;
        }

        /* Thumb zones at the very bottom */
        .hold-zones {
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 30px;
            z-index: 100;
        }

        .zone {
            width: 85px;
            height: 85px;
            border: 2px dashed rgba(255,255,255,0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .zone.held {
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.04);
            transform: scale(0.95);
        }

        .zone-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }

        .zone.held .zone-dot {
            background: rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .hold-hint {
            position: fixed;
            bottom: 140px;
            width: 100%;
            text-align: center;
            color: #222;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Gone / Error states */
        .state { display: none; }
        .state.active { display: block; }
        .gone-text { color: #333; font-size: 0.85rem; margin-top: 100px; text-align: center; }

        /* Desktop: auto-show */
        @media (hover: hover) and (pointer: fine) {
            .hold-zones, .hold-hint { display: none !important; }
            .msg-card { opacity: 1; transform: none; }
        }

        /* Password */
        #pwWrap input {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #ccc;
            padding: 12px 16px;
            font-family: inherit;
            border-radius: 8px;
            width: 220px;
            text-align: center;
            outline: none;
        }
        #pwWrap button {
            display: block;
            margin: 15px auto 0;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #999;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="shield"></div>

    <div class="state active" id="stateLoading"></div>

    <!-- Message Display Area -->
    <div class="state" id="stateMessage">
        <div class="msg-card" id="msgCard">
            <div class="msg-text" id="msgText"></div>
        </div>
        <div class="hold-hint" id="holdHint">hold both circles at the bottom</div>
    </div>

    <!-- Gone -->
    <div class="state" id="stateGone">
        <div class="gone-text">this message no longer exists</div>
    </div>

    <!-- Password -->
    <div class="state" id="statePw">
        <div id="pwWrap">
            <input type="password" id="pw" placeholder="password">
            <button onclick="submitPw()">unlock</button>
        </div>
    </div>

    <!-- Controls (Mobile only) -->
    <div class="hold-zones" id="holdZones" style="display:none;">
        <div class="zone" id="zoneLeft"><div class="zone-dot"></div></div>
        <div class="zone" id="zoneRight"><div class="zone-dot"></div></div>
    </div>

    <script>
        const msgId = window.location.pathname.split('/view/')[1];
        const shield = document.getElementById('shield');
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        let destroyed = false;
        let messageLoaded = false;

        // Security
        document.addEventListener('visibilitychange', () => { if (document.hidden && messageLoaded) killMessage(); });
        window.addEventListener('blur', () => { if (messageLoaded) killMessage(); });
        window.addEventListener('pagehide', () => killMessage());
        window.addEventListener('beforeunload', () => killMessage());

        // Hold Logic
        const zoneLeft = document.getElementById('zoneLeft');
        const zoneRight = document.getElementById('zoneRight');
        const msgCard = document.getElementById('msgCard');
        const holdHint = document.getElementById('holdHint');
        const msgText = document.getElementById('msgText');

        let leftHeld = false;
        let rightHeld = false;
        let activeTouches = {};

        function isInsideZone(touch, zone) {
            const rect = zone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const radius = rect.width / 2;
            const dx = touch.clientX - centerX;
            const dy = touch.clientY - centerY;
            // 20px Grace area (buffer) so it's not too sensitive
            const buffer = 20;
            return (dx * dx + dy * dy) <= ((radius + buffer) * (radius + buffer));
        }

        function updateHoldState() {
            if (destroyed || !messageLoaded) return;
            if (leftHeld && rightHeld) {
                msgCard.classList.add('visible');
                holdHint.style.opacity = '0';
            } else {
                msgCard.classList.remove('visible');
                holdHint.style.opacity = '1';
            }
        }

        if (isTouchDevice) {
            document.addEventListener('touchstart', (e) => {
                if (!messageLoaded || destroyed) return;
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (isInsideZone(t, zoneLeft)) {
                        leftHeld = true; zoneLeft.classList.add('held');
                        activeTouches[t.identifier] = 'left';
                    }
                    if (isInsideZone(t, zoneRight)) {
                        rightHeld = true; zoneRight.classList.add('held');
                        activeTouches[t.identifier] = 'right';
                    }
                }
                updateHoldState();
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                if (!messageLoaded || destroyed) return;
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (activeTouches[t.identifier] === 'left' && !isInsideZone(t, zoneLeft)) {
                        leftHeld = false; zoneLeft.classList.remove('held'); delete activeTouches[t.identifier];
                    }
                    if (activeTouches[t.identifier] === 'right' && !isInsideZone(t, zoneRight)) {
                        rightHeld = false; zoneRight.classList.remove('held'); delete activeTouches[t.identifier];
                    }
                }
                updateHoldState();
            }, { passive: false });

            document.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (activeTouches[t.identifier] === 'left') { leftHeld = false; zoneLeft.classList.remove('held'); }
                    if (activeTouches[t.identifier] === 'right') { rightHeld = false; zoneRight.classList.remove('held'); }
                    delete activeTouches[t.identifier];
                }
                updateHoldState();
            });

            document.addEventListener('touchcancel', () => {
                leftHeld = false; rightHeld = false;
                zoneLeft.classList.remove('held'); zoneRight.classList.remove('held');
                activeTouches = {}; updateHoldState();
            });
        }

        async function loadMessage(password) {
            try {
                const res = await fetch(`/api/messages/${msgId}/reveal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password || '' })
                });
                const data = await res.json();
                if (!res.ok) {
                    if (data.error && data.error.includes('password')) { showState('statePw'); return; }
                    showState('stateGone'); return;
                }
                msgText.textContent = data.content;
                messageLoaded = true;
                showState('stateMessage');
                if (isTouchDevice) { document.getElementById('holdZones').style.display = 'flex'; }
                else { msgCard.classList.add('visible'); }
            } catch { showState('stateGone'); }
        }

        function showState(id) {
            document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function submitPw() {
            const pw = document.getElementById('pw').value;
            if (pw) { showState('stateLoading'); loadMessage(pw); }
        }

        function killMessage() {
            if (destroyed) return;
            destroyed = true;
            document.body.innerHTML = '<div class="gone-text">this message no longer exists</div>';
        }

        if (msgId) loadMessage();
    </script>
</body>
</html>
