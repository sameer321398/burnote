<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Message</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        @media print { html, body { display: none !important; } }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            touch-action: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
        }

        /* Top Header */
        .header {
            width: 100%;
            text-align: center;
            margin-bottom: 40px;
            opacity: 0.5;
        }
        .header-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Message Card - FIXED TOP */
        .card-container {
            width: 100%;
            max-width: 440px;
            margin-top: 20px;
        }

        .msg-card {
            width: 100%;
            min-height: 200px;
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 32px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            opacity: 0;
            transform: scale(0.98) translateY(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .msg-card.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .msg-text {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #eee;
            width: 100%;
            font-weight: 300;
        }

        /* Hint Text */
        .hold-hint {
            position: fixed;
            bottom: 160px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: #444;
            letter-spacing: 1px;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        /* Thumb Sensors - LOCKED BOTTOM */
        .sensor-container {
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1000;
        }

        .sensor {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s;
        }

        .sensor::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        .sensor.active {
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
        }

        .sensor.active::before {
            border-color: rgba(255,255,255,0.1);
            transform: scale(1.1);
        }

        .sensor-dot {
            width: 12px;
            height: 12px;
            background: #222;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .sensor.active .sensor-dot {
            background: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        /* System Messages Overlay */
        #shield {
            position: fixed; inset: 0; background: #000; z-index: 99999; display: none;
        }
        #shield.on { display: block; }

        .state { display: none; text-align: center; margin-top: 100px; }
        .state.active { display: block; }
        .info-text { font-size: 0.9rem; color: #555; }

        /* Desktop: Direct Reveal */
        @media (hover: hover) and (pointer: fine) {
            .sensor-container, .hold-hint { display: none !important; }
            .msg-card { opacity: 1; transform: none; }
        }

        /* Password Input Area */
        #pwWrap input {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 16px 24px;
            border-radius: 12px;
            width: 260px;
            outline: none;
            font-family: inherit;
            margin-bottom: 20px;
            text-align: center;
        }
        #pwWrap button {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 40px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="shield"></div>

    <div class="header">
        <div class="header-title">Secure Decrypted Note</div>
    </div>

    <!-- Message State -->
    <div class="state active" id="stateMessage">
        <div class="card-container">
            <div class="msg-card" id="msgCard">
                <div class="msg-text" id="msgText"></div>
            </div>
        </div>
        <div class="hold-hint" id="holdHint">Hold both sensors to view</div>

        <div class="sensor-container" id="sensorContainer" style="display:none;">
            <div class="sensor" id="sensorLeft"><div class="sensor-dot"></div></div>
            <div class="sensor" id="sensorRight"><div class="sensor-dot"></div></div>
        </div>
    </div>

    <!-- Loading State -->
    <div class="state" id="stateLoading">
        <div class="info-text">Decrypting tunnel...</div>
    </div>

    <!-- Gone State -->
    <div class="state" id="stateGone">
        <div class="info-text">Note expired or already destroyed.</div>
    </div>

    <!-- Password State -->
    <div class="state" id="statePw">
        <div id="pwWrap">
            <input type="password" id="pw" placeholder="Enter security key">
            <br>
            <button onclick="submitPw()">Unlock</button>
        </div>
    </div>

    <script>
        const msgId = window.location.pathname.split('/view/')[1];
        const shield = document.getElementById('shield');
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        let destroyed = false;
        let messageLoaded = false;

        // Security listeners
        document.addEventListener('visibilitychange', () => { if (document.hidden && messageLoaded) killMessage(); });
        window.addEventListener('blur', () => { if (messageLoaded) killMessage(); });
        window.addEventListener('pagehide', () => killMessage());
        window.addEventListener('beforeunload', () => killMessage());

        // Interaction
        const sensorLeft = document.getElementById('sensorLeft');
        const sensorRight = document.getElementById('sensorRight');
        const msgCard = document.getElementById('msgCard');
        const holdHint = document.getElementById('holdHint');
        const msgText = document.getElementById('msgText');

        let leftHeld = false;
        let rightHeld = false;
        let activeTouches = {};

        function isInsideZone(touch, sensor) {
            const rect = sensor.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const radius = rect.width / 2;
            const dx = touch.clientX - centerX;
            const dy = touch.clientY - centerY;
            const buffer = 25; // Good buffer for smooth feel
            return (dx * dx + dy * dy) <= ((radius + buffer) * (radius + buffer));
        }

        function updateHoldState() {
            if (destroyed || !messageLoaded) return;
            if (leftHeld && rightHeld) {
                msgCard.classList.add('visible');
                holdHint.style.opacity = '0';
            } else {
                msgCard.classList.remove('visible');
                holdHint.style.opacity = '1';
            }
        }

        if (isTouchDevice) {
            document.addEventListener('touchstart', (e) => {
                if (!messageLoaded || destroyed) return;
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (isInsideZone(t, sensorLeft)) {
                        leftHeld = true; sensorLeft.classList.add('active'); activeTouches[t.identifier] = 'left';
                    }
                    if (isInsideZone(t, sensorRight)) {
                        rightHeld = true; sensorRight.classList.add('active'); activeTouches[t.identifier] = 'right';
                    }
                }
                updateHoldState();
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                if (!messageLoaded || destroyed) return;
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (activeTouches[t.identifier] === 'left' && !isInsideZone(t, sensorLeft)) {
                        leftHeld = false; sensorLeft.classList.remove('active'); delete activeTouches[t.identifier];
                    }
                    if (activeTouches[t.identifier] === 'right' && !isInsideZone(t, sensorRight)) {
                        rightHeld = false; sensorRight.classList.remove('active'); delete activeTouches[t.identifier];
                    }
                }
                updateHoldState();
            });

            document.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (activeTouches[t.identifier] === 'left') { leftHeld = false; sensorLeft.classList.remove('active'); }
                    if (activeTouches[t.identifier] === 'right') { rightHeld = false; sensorRight.classList.remove('active'); }
                    delete activeTouches[t.identifier];
                }
                updateHoldState();
            });
        }

        async function loadMessage(password) {
            try {
                const res = await fetch(`/api/messages/${msgId}/reveal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password || '' })
                });
                const data = await res.json();
                if (!res.ok) {
                    if (data.error && data.error.includes('password')) { showState('statePw'); return; }
                    showState('stateGone'); return;
                }
                msgText.textContent = data.content;
                messageLoaded = true;
                showState('stateMessage');
                if (isTouchDevice) document.getElementById('sensorContainer').style.display = 'flex';
            } catch { showState('stateGone'); }
        }

        function showState(id) {
            document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function submitPw() {
            const pw = document.getElementById('pw').value;
            if (pw) { showState('stateLoading'); loadMessage(pw); }
        }

        function killMessage() {
            if (destroyed) return;
            destroyed = true;
            document.body.innerHTML = '<div style="color:#333; font-size: 0.8rem; margin-top:100px; text-align:center;">This note has been purged.</div>';
        }

        if (msgId) loadMessage();
    </script>
</body>
</html>
