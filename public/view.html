<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#070710">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Secure Message — BurNote</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* Block screenshots / selection */
        * {
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        @media print { html, body { display: none !important; } }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #070710;
            color: #eeeef5;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            touch-action: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: max(4vh, 20px) max(5vw, 16px);
        }

        /* ——— Header ——— */
        .top-bar {
            width: 100%;
            text-align: center;
            margin-bottom: max(3vh, 16px);
            opacity: 0.3;
        }
        .top-bar__text {
            font-size: 0.58rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-weight: 500;
        }

        /* ——— Main ——— */
        .main-area {
            flex: 1;
            width: 100%;
            max-width: 440px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: max(18vh, 100px);
        }

        .msg-card {
            width: 100%;
            background: linear-gradient(165deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.015) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: max(24px, 5vw);
            opacity: 0;
            transform: scale(0.96) translateY(12px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .msg-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,107,53,0.25), transparent);
        }

        .msg-card.visible { opacity: 1; transform: scale(1) translateY(0); }

        .msg-text {
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            line-height: 1.75;
            color: #e8e8f0;
            font-weight: 300;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        /* ——— Sensors (mobile) ——— */
        .sensor-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: max(180px, 22vh);
            padding: 0 8vw max(36px, env(safe-area-inset-bottom, 36px));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            z-index: 1000;
        }

        .sensor-row {
            width: 100%;
            max-width: 420px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .sensor-hint {
            margin-bottom: max(24px, 3vh);
            font-size: 0.68rem;
            color: #333;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 500;
            transition: opacity 0.25s;
        }

        .sensor {
            width: clamp(66px, 18vw, 80px);
            height: clamp(66px, 18vw, 80px);
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.015);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .sensor-dot {
            width: 10px;
            height: 10px;
            background: #1a1a2a;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sensor.active {
            border-color: rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.05);
            transform: scale(0.93);
        }

        .sensor.active .sensor-dot {
            background: #fff;
            box-shadow: 0 0 18px rgba(255,255,255,0.5);
        }

        /* ——— States ——— */
        #shield { position: fixed; inset: 0; background: #070710; z-index: 99999; display: none; }
        #shield.on { display: block; }

        .state { display: none; text-align: center; width: 100%; padding-top: 12vh; }
        .state.active { display: block; animation: fadeUp 0.4s ease; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .state h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .status-msg {
            font-size: 0.82rem;
            color: #555;
            line-height: 1.5;
        }

        /* ——— Password ——— */
        #pwArea {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        #pwArea input {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
            padding: 16px 20px;
            border-radius: 14px;
            width: min(240px, 80vw);
            text-align: center;
            outline: none;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.25s;
        }

        #pwArea input:focus {
            border-color: rgba(255,107,53,0.4);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.08);
        }

        #pwArea button {
            background: linear-gradient(135deg, #ff6b35, #ff2d55);
            color: #fff;
            border: none;
            padding: 14px 36px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 48px;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s;
        }

        #pwArea button:active { transform: scale(0.96); }

        /* ——— Desktop ——— */
        @media (hover: hover) and (pointer: fine) {
            .sensor-area { display: none !important; }
            .msg-card { opacity: 1; transform: none; }
            .main-area { padding-bottom: 0; }
        }

        /* ——— Spinner ——— */
        .spin-ring {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.25rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Purged screen */
        .purged {
            color: #1a1a2a;
            font-size: 0.72rem;
            text-align: center;
            margin-top: 25vh;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="shield"></div>

    <div class="top-bar"><div class="top-bar__text">Secure Message Bridge</div></div>

    <!-- Message -->
    <div class="state active" id="stateMsg">
        <div class="main-area">
            <div class="msg-card" id="msgCard">
                <div class="msg-text" id="msgText"></div>
            </div>
        </div>
        <div class="sensor-area" id="sensorArea" style="display:none;">
            <div class="sensor-hint" id="sensorHint">Hold both thumbs to read</div>
            <div class="sensor-row">
                <div class="sensor" id="sL"><div class="sensor-dot"></div></div>
                <div class="sensor" id="sR"><div class="sensor-dot"></div></div>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div class="state" id="stateLoad">
        <div class="spin-ring"></div>
        <h2>Decrypting</h2>
        <p class="status-msg">Securely retrieving message…</p>
    </div>

    <!-- Gone -->
    <div class="state" id="stateGone">
        <h2 style="margin-bottom:0.5rem;">💀 Message Destroyed</h2>
        <p class="status-msg">This message has been viewed or the link expired.</p>
    </div>

    <!-- Password -->
    <div class="state" id="statePw">
        <h2 style="margin-bottom:1.5rem;">🔒 Password Required</h2>
        <div id="pwArea">
            <input type="password" id="pw" placeholder="Enter password" autocomplete="off">
            <button onclick="submitPw()">Unlock</button>
        </div>
    </div>

    <script>
        const msgId = window.location.pathname.split('/view/')[1];
        const shield = document.getElementById('shield');
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        let destroyed = false;
        let loaded = false;

        // Security: hide on tab switch / blur
        document.addEventListener('visibilitychange', () => { if (document.hidden && loaded) kill(); });
        window.addEventListener('blur', () => { if (loaded) kill(); });
        window.addEventListener('pagehide', kill);
        window.addEventListener('beforeunload', kill);

        // Sensors
        const sL = document.getElementById('sL');
        const sR = document.getElementById('sR');
        const msgCard = document.getElementById('msgCard');
        const sensorHint = document.getElementById('sensorHint');
        const msgText = document.getElementById('msgText');

        let leftOn = false, rightOn = false;
        let touches = {};

        function inZone(t, el) {
            const r = el.getBoundingClientRect();
            const cx = r.left + r.width / 2;
            const cy = r.top + r.height / 2;
            const rad = r.width / 2 + 30;
            const dx = t.clientX - cx;
            const dy = t.clientY - cy;
            return (dx * dx + dy * dy) <= rad * rad;
        }

        function refresh() {
            if (destroyed || !loaded) return;
            if (leftOn && rightOn) {
                msgCard.classList.add('visible');
                sensorHint.style.opacity = '0';
            } else {
                msgCard.classList.remove('visible');
                sensorHint.style.opacity = '1';
            }
        }

        if (isTouch) {
            document.addEventListener('touchstart', e => {
                if (!loaded || destroyed) return;
                e.preventDefault();
                for (const t of e.changedTouches) {
                    if (inZone(t, sL)) { leftOn = true; sL.classList.add('active'); touches[t.identifier] = 'L'; }
                    if (inZone(t, sR)) { rightOn = true; sR.classList.add('active'); touches[t.identifier] = 'R'; }
                }
                refresh();
            }, { passive: false });

            document.addEventListener('touchmove', e => {
                if (!loaded || destroyed) return;
                for (const t of e.changedTouches) {
                    if (touches[t.identifier] === 'L' && !inZone(t, sL)) { leftOn = false; sL.classList.remove('active'); delete touches[t.identifier]; }
                    if (touches[t.identifier] === 'R' && !inZone(t, sR)) { rightOn = false; sR.classList.remove('active'); delete touches[t.identifier]; }
                }
                refresh();
            });

            document.addEventListener('touchend', e => {
                for (const t of e.changedTouches) {
                    if (touches[t.identifier] === 'L') { leftOn = false; sL.classList.remove('active'); }
                    if (touches[t.identifier] === 'R') { rightOn = false; sR.classList.remove('active'); }
                    delete touches[t.identifier];
                }
                refresh();
            });
        }

        async function loadMsg(password) {
            show('stateLoad');
            try {
                const res = await fetch(`/api/messages/${msgId}/reveal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password || '' })
                });
                const data = await res.json();
                if (!res.ok) {
                    if (data.error?.includes('password')) { show('statePw'); return; }
                    show('stateGone'); return;
                }
                msgText.textContent = data.content;
                loaded = true;
                show('stateMsg');
                if (isTouch) document.getElementById('sensorArea').style.display = 'flex';
            } catch { show('stateGone'); }
        }

        function show(id) {
            document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
            document.getElementById(id)?.classList.add('active');
        }

        function submitPw() {
            const val = document.getElementById('pw').value;
            if (val) loadMsg(val);
        }

        function kill() {
            if (destroyed) return;
            destroyed = true;
            document.body.innerHTML = '<div class="purged">Purged.</div>';
        }

        // Enter key on password
        document.getElementById('pw')?.addEventListener('keydown', e => { if (e.key === 'Enter') submitPw(); });

        if (msgId) loadMsg();
    </script>
</body>
</html>
