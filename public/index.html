<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Send self-destructing secret messages">
    <meta name="theme-color" content="#000000">
    <title>BurNote</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background: #000;
            color: #ccc;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        /* Textarea */
        textarea {
            width: 100%;
            min-height: 160px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: #d0d0d0;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.7;
            padding: 16px;
            border-radius: 8px;
            resize: none; /* Disable resizing to keep layout stable */
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: rgba(255,255,255,0.18);
        }

        textarea::placeholder {
            color: #333;
        }

        /* Button */
        .create-btn {
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #999;
            font-family: inherit;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .create-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border-color: rgba(255,255,255,0.15);
        }

        .create-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Link result */
        .result {
            display: none;
            margin-top: 16px;
        }

        .result.show { display: block; }

        .link-box {
            display: flex;
            gap: 8px;
        }

        .link-box input {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: #aaa;
            padding: 12px;
            font-family: inherit;
            font-size: 0.8rem;
            border-radius: 8px;
            outline: none;
        }

        .copy-btn, .wa-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #888;
            padding: 10px 16px;
            font-family: inherit;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .copy-btn:hover, .wa-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #ccc;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .actions button { flex: 1; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.08);
            color: #aaa;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }

        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <textarea id="msg" placeholder="type your message (max 500 chars)..." maxlength="500"></textarea>
        <button class="create-btn" id="createBtn" onclick="create()">create link</button>

        <div class="result" id="result">
            <div class="link-box">
                <input type="text" id="linkOut" readonly>
                <button class="copy-btn" onclick="copyLink()">copy</button>
            </div>
            <div class="actions">
                <button class="wa-btn" onclick="shareWA()">whatsapp</button>
                <button class="wa-btn" onclick="newMsg()">new</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentLink = '';
        let currentId = '';

        async function create() {
            const msg = document.getElementById('msg').value.trim();
            if (!msg) return;

            if (msg.length > 500) {
                showToast('message too long');
                return;
            }

            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.textContent = 'creating...';

            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: msg,
                        expiresIn: 1440,
                        maxViews: 1
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    showToast(data.error || 'something went wrong');
                    btn.disabled = false;
                    btn.textContent = 'create link';
                    return;
                }

                currentLink = data.link;
                currentId = data.id;
                document.getElementById('linkOut').value = currentLink;
                document.getElementById('result').classList.add('show');
                document.getElementById('msg').style.display = 'none';
                btn.style.display = 'none';
                showToast('link created');

            } catch (err) {
                showToast('failed to create');
                btn.disabled = false;
                btn.textContent = 'create link';
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(currentLink);
            showToast('copied');
        }

        function shareWA() {
            window.open(`https://wa.me/?text=${encodeURIComponent(currentLink)}`, '_blank');
        }

        function newMsg() {
            document.getElementById('msg').value = '';
            document.getElementById('msg').style.display = '';
            document.getElementById('createBtn').style.display = '';
            document.getElementById('createBtn').disabled = false;
            document.getElementById('createBtn').textContent = 'create link';
            document.getElementById('result').classList.remove('show');
            currentLink = '';
            currentId = '';
        }

        function showToast(text) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
